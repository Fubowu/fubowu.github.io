title: 福伯論壇
description: 以文字記錄自然之美與人文之思，探索台灣的草木花卉，也評論時事、抒發感懷。
author: 福伯
baseurl: ""
url: "https://fubowu.life"
lang: zh-TW
timezone: Asia/Taipei
future: true

# 分頁設定
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
paginate: 8
paginate_path: "/page/:num/"

# 文章永久連結
permalink: /posts/:year/:month/:day/:slug/

# 排除不需要部署的檔案
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.sh"

# Markdown 設定
markdown: kramdown
kramdown:
  input: GFM
